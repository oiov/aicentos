server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    # ── Gzip 压缩 ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/woff
        font/woff2;

    # ── 安全响应头 ─────────────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"         always;
    add_header X-XSS-Protection        "1; mode=block"   always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── 静态资源长缓存 (哈希文件名，immutable) ─────────────────────────────
    location ~* ^/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── 图片 ───────────────────────────────────────────────────────────────
    location ~* ^/img/ {
        expires 30d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ── Feed / RSS (XML Content-Type) ──────────────────────────────────────
    location ~* ^/feed\.(xml|atom)$ {
        default_type application/xml;
        add_header Content-Type "application/xml; charset=utf-8" always;
        add_header X-Content-Type-Options "nosniff" always;
        expires 1h;
    }

    # ── Sitemap ─────────────────────────────────────────────────────────────
    location ~* ^/sitemap.*\.xml$ {
        default_type application/xml;
        expires 1h;
    }

    # ── robots.txt ──────────────────────────────────────────────────────────
    location = /robots.txt {
        expires 1d;
    }

    # ── Clean URLs：尝试 uri → uri/ → uri.html → SPA 兜底 ──────────────────
    location / {
        # 先精确匹配文件，再加 .html 后缀，最后回退到 index.html
        try_files $uri $uri/ $uri.html /index.html;

        # HTML 文件不缓存（确保版本更新即时生效）
        location ~* \.html$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }
    }

    # ── 隐藏版本号 ─────────────────────────────────────────────────────────
    server_tokens off;
}
