name: Backup main & back

on:
  schedule:
    # 每天 UTC 19:00（台北时间凌晨 3:00）
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 备份两个数据库
        env:
          MAIN_DB_URL: ${{ secrets.MAIN_DB_URL }}
          BACK_DB_URL: ${{ secrets.BACK_DB_URL }}
        run: |
          set -euo pipefail
          TIMESTAMP=$(date -u '+%Y%m%d_%H%M%S')

          echo "备份 main..."
          docker run --rm \
            -v /tmp:/backup \
            -e "DB_URL=${MAIN_DB_URL}" \
            postgres:17-bookworm \
            sh -c 'pg_dump -Fc -v -d "$DB_URL" -f /backup/main_'"${TIMESTAMP}"'.dump'

          echo "备份 back..."
          docker run --rm \
            -v /tmp:/backup \
            -e "DB_URL=${BACK_DB_URL}" \
            postgres:17-bookworm \
            sh -c 'pg_dump -Fc -v -d "$DB_URL" -f /backup/back_'"${TIMESTAMP}"'.dump'

          echo "备份完成，文件列表："
          ls -lh /tmp/main_*.dump /tmp/back_*.dump

      - name: 上传备份到 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: neon-backup-${{ github.run_id }}
          path: |
            /tmp/main_*.dump
            /tmp/back_*.dump
          retention-days: 90