name: DB Backup (All Databases)

on:
  schedule:
    # 每天 UTC 4:00 (北京时间 12:00) 执行
    - cron: '0 4 * * *'
  workflow_dispatch:

concurrency:
  group: db-backup-all
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      MASTER_DSN: ${{ secrets.MASTER_DSN }}
      SLAVE_DSNS: ${{ secrets.SLAVE_DSNS }}
      BACKUP_REPO: nbility/new-api
      BACKUP_BRANCH: main
      BACKUP_DIR: pg
      MAX_PARALLEL: 4
      WORK_ROOT: /tmp/db-backup
    steps:
      - name: Checkout backup repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.BACKUP_REPO }}
          ref: ${{ env.BACKUP_BRANCH }}
          token: ${{ secrets.BACKUP_REPO_TOKEN }}
          fetch-depth: 1
          path: backup-repo

      - name: Ensure Git LFS
        run: |
          set -euo pipefail
          if command -v git-lfs >/dev/null 2>&1; then
            git lfs install
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install -y git-lfs
          git lfs install

      - name: Dump all databases in parallel
        shell: bash
        run: |
          set -euo pipefail

          TIMESTAMP="$(date -u '+%Y-%m-%d_%H%M%S')"
          INPUT_FILE="${WORK_ROOT}/db-list.txt"
          REPORT_DIR="${WORK_ROOT}/reports"
          DUMP_ROOT="${WORK_ROOT}/pg"
          STATUS_DIR="${WORK_ROOT}/status"

          mkdir -p "$REPORT_DIR" "$DUMP_ROOT" "$STATUS_DIR"
          : > "$INPUT_FILE"

          if [ -n "${MASTER_DSN:-}" ]; then
            printf 'master|%s\n' "$MASTER_DSN" >> "$INPUT_FILE"
          fi

          if [ -n "${SLAVE_DSNS:-}" ]; then
            while IFS='|' read -r DB_NAME DB_DSN; do
              DB_NAME="$(echo "${DB_NAME:-}" | xargs)"
              DB_DSN="$(echo "${DB_DSN:-}" | xargs)"
              [ -z "$DB_NAME" ] && continue
              [[ "$DB_NAME" == \#* ]] && continue
              [ -z "$DB_DSN" ] && continue
              case "$DB_DSN" in
                postgres://*|postgresql://*) ;;
                *) continue ;;
              esac
              printf '%s|%s\n' "$DB_NAME" "$DB_DSN" >> "$INPUT_FILE"
            done <<< "$SLAVE_DSNS"
          fi

          DB_COUNT=$(grep -cE '^[a-zA-Z0-9_-]+\|postgres(ql)?://' "$INPUT_FILE" || true)
          if [ "$DB_COUNT" -eq 0 ]; then
            echo "::error::No valid database DSNs found. Please set MASTER_DSN and/or SLAVE_DSNS."
            exit 1
          fi

          echo "Found ${DB_COUNT} database(s) to back up"

          run_dump() {
            local db_name="$1"
            local db_dsn="$2"
            local target_dir="${DUMP_ROOT}/${db_name}"
            local dump_file="${target_dir}/${TIMESTAMP}.dump"
            local report_file="${REPORT_DIR}/${db_name}.txt"
            local status_file="${STATUS_DIR}/${db_name}.status"

            mkdir -p "$target_dir"
            local start end elapsed size
            start=$(date +%s)

            if docker run --rm \
              -v "${target_dir}:/backup" \
              -e "DATABASE_URL=${db_dsn}" \
              postgres:18-bookworm \
              sh -lc 'pg_dump -v -d "$DATABASE_URL" -F c --compress=9 -f /backup/'"${TIMESTAMP}"'.dump'
            then
              end=$(date +%s)
              elapsed=$((end-start))
              size=$(du -h "$dump_file" | cut -f1)
              printf '%s|OK|%s|%ss\n' "$db_name" "$size" "$elapsed" > "$report_file"
              echo ok > "$status_file"
              echo "${db_name}: backup completed (${size}, ${elapsed}s)"
            else
              end=$(date +%s)
              elapsed=$((end-start))
              rm -f "$dump_file"
              printf '%s|FAIL|?|%ss\n' "$db_name" "$elapsed" > "$report_file"
              echo fail > "$status_file"
              echo "::error::${db_name}: backup failed after ${elapsed}s"
            fi
          }

          active_jobs=0
          while IFS='|' read -r DB_NAME DB_DSN; do
            [ -z "${DB_NAME:-}" ] && continue
            run_dump "$DB_NAME" "$DB_DSN" &
            active_jobs=$((active_jobs+1))

            if [ "$active_jobs" -ge "$MAX_PARALLEL" ]; then
              wait -n || true
              active_jobs=$((active_jobs-1))
            fi
          done < "$INPUT_FILE"

          wait || true

          {
            echo "BACKUP_TIMESTAMP=$TIMESTAMP"
          } >> "$GITHUB_ENV"

          FAIL_COUNT=$(grep -Rxc 'fail' "$STATUS_DIR" || true)
          if [ "$FAIL_COUNT" -gt 0 ]; then
            echo "::error::${FAIL_COUNT} database backup(s) failed"
            exit 1
          fi

      - name: Publish backups
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.BACKUP_REPO_TOKEN }}
        run: |
          set -euo pipefail

          if [ ! -d "${WORK_ROOT}/pg" ]; then
            echo "::warning::No backup payload generated"
            exit 1
          fi

          cd backup-repo
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${BACKUP_REPO}.git"
          grep -q '^pg/\*\* filter=lfs' .gitattributes 2>/dev/null || printf "pg/** filter=lfs diff=lfs merge=lfs -text\n" >> .gitattributes
          git add .gitattributes

          mkdir -p "$BACKUP_DIR"
          cp -R "${WORK_ROOT}/pg/." "$BACKUP_DIR/"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$BACKUP_DIR"

          if git diff --cached --quiet; then
            echo "No backup files changed"
          else
            git commit -m "backup: all databases ${BACKUP_TIMESTAMP}"
            git push origin "$BACKUP_BRANCH" || {
              git pull --rebase origin "$BACKUP_BRANCH"
              git push origin "$BACKUP_BRANCH"
            }
          fi

      - name: Print backup summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          REPORT_DIR="${WORK_ROOT}/reports"
          if [ ! -d "$REPORT_DIR" ]; then
            echo "::warning::No backup reports found"
            exit 0
          fi

          cat "$REPORT_DIR"/*.txt
