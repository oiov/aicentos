name: DB Sync (Master → Slaves)

on:
  schedule:
    # 每天 UTC 4:00 (北京时间 12:00) 执行
    - cron: '0 4 * * *'
  workflow_dispatch:

concurrency:
  group: db-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DUMP_FILE: /tmp/master_dump.dump
    steps:
      - name: Install PostgreSQL 18 client
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates git-lfs jq
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/pgdg.gpg
          echo "deb [signed-by=/usr/share/keyrings/pgdg.gpg] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-18
          # 确保 PG18 二进制优先于系统自带旧版
          echo "/usr/lib/postgresql/18/bin" >> $GITHUB_PATH

      # ========== 1. 完整导出主库 ==========
      - name: Dump master (full backup)
        env:
          PGPASSWORD: ${{ secrets.MASTER_DB_PASSWORD }}
          PGHOST: ${{ secrets.MASTER_DB_HOST }}
          PGPORT: ${{ secrets.MASTER_DB_PORT }}
          PGUSER: ${{ secrets.MASTER_DB_USER }}
          PGDATABASE: ${{ secrets.MASTER_DB_NAME }}
        run: |
          set -e
          START=$(date +%s)
          pg_dump -v \
            -F c \
            --compress=9 \
            -f "$DUMP_FILE"
          END=$(date +%s)
          DUMP_SIZE=$(du -h "$DUMP_FILE" | cut -f1)
          echo "Dump size: $DUMP_SIZE, took $((END-START))s"
          echo "DUMP_SIZE=$DUMP_SIZE" >> $GITHUB_ENV
          echo "DUMP_TIME=$((END-START))s" >> $GITHUB_ENV

          # 生成恢复清单，排除 logs 表数据（从库不需要日志）
          pg_restore -l "$DUMP_FILE" | grep -v 'TABLE DATA.*logs' > /tmp/restore_list.txt
          echo "Restore list: $(wc -l < /tmp/restore_list.txt) entries (logs data excluded)"

      # ========== 2. 备份到 Git 仓库 ==========
      - name: Push dump to backup repo
        env:
          GH_TOKEN: ${{ secrets.BACKUP_REPO_TOKEN }}
        run: |
          set -e
          TIMESTAMP=$(date -u '+%Y-%m-%d_%H%M%S')
          FILENAME="${TIMESTAMP}.dump"

          FILE_SIZE_MB=$(du -m "$DUMP_FILE" | cut -f1)
          echo "Dump file size: ${FILE_SIZE_MB}MB"
          if [ "$FILE_SIZE_MB" -gt 500 ]; then
            echo "::warning::Dump file is ${FILE_SIZE_MB}MB, consider cleanup"
          fi

          gh repo clone fishxcode/new-api /tmp/backup-repo -- --depth 1 --single-branch --branch main
          cd /tmp/backup-repo

          # 配置 git 凭证，确保 push 时能认证
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/fishxcode/new-api.git"

          git lfs install
          grep -q 'pg/\*.dump' .gitattributes 2>/dev/null || git lfs track "pg/*.dump"
          git add .gitattributes

          mkdir -p pg
          cp "$DUMP_FILE" "pg/${FILENAME}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "pg/${FILENAME}"

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "backup: pg dump ${TIMESTAMP}"
            git push origin main || {
              git pull --rebase origin main
              git push origin main
            }
            echo "Pushed pg/${FILENAME} to fishxcode/new-api"
          fi
          rm -rf /tmp/backup-repo

      # ========== 3. 恢复到从库 (串行，避免 artifact 泄露) ==========
      - name: Restore to zeabur-sjc1
        env:
          DATABASE_URL: ${{ secrets.SLAVE_ZEABUR_DSN }}
        run: |
          set -eo pipefail
          echo "::group::pg_restore → zeabur-sjc1"
          START=$(date +%s)
          RC=0
          pg_restore -v -d "$DATABASE_URL" \
            --clean --if-exists \
            --no-owner --no-privileges \
            -L /tmp/restore_list.txt \
            /tmp/master_dump.dump 2>/tmp/restore_zeabur.log || RC=$?
          END=$(date +%s)
          cat /tmp/restore_zeabur.log
          echo "::endgroup::"

          FATAL=$(grep -cE "FATAL|could not connect|authentication failed|no password supplied" /tmp/restore_zeabur.log || true)
          if [ "$FATAL" -gt 0 ]; then
            echo "::error::zeabur-sjc1 restore fatal error"
            exit 1
          fi
          if [ "$RC" -gt 1 ]; then
            echo "::error::pg_restore failed (exit $RC)"
            exit 1
          fi
          echo "zeabur-sjc1 restore took $((END-START))s (exit: $RC)"
          echo "ZEABUR_TIME=$((END-START))s" >> $GITHUB_ENV
          echo "ZEABUR_RC=$RC" >> $GITHUB_ENV

      - name: Verify zeabur-sjc1
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.SLAVE_ZEABUR_DSN }}
        run: |
          set -e
          # 重试机制：最多尝试 3 次
          for i in 1 2 3; do
            COUNT=$(psql -A -t "$DATABASE_URL" -c "SELECT count(*) FROM pg_stat_user_tables;" 2>/dev/null | tr -d '[:space:]') && break
            echo "::warning::Attempt $i failed, retrying in 5s..."
            sleep 5
          done

          # 空值检查
          if [ -z "$COUNT" ]; then
            echo "::warning::zeabur-sjc1: Unable to verify (connection failed)"
            echo "ZEABUR_TABLES=?" >> $GITHUB_ENV
            exit 0
          fi

          echo "zeabur-sjc1: $COUNT tables"
          if [ "$COUNT" -ge 10 ]; then
            echo "ZEABUR_TABLES=$COUNT" >> $GITHUB_ENV
          else
            echo "::warning::Table count ($COUNT) lower than expected (10)"
            echo "ZEABUR_TABLES=$COUNT⚠️" >> $GITHUB_ENV
          fi

      - name: Restore to neon-azure
        env:
          DATABASE_URL: ${{ secrets.SLAVE_NEON_DSN }}
        run: |
          set -eo pipefail
          echo "::group::pg_restore → neon-azure"
          START=$(date +%s)
          RC=0
          pg_restore -v -d "$DATABASE_URL" \
            --clean --if-exists \
            --no-owner --no-privileges \
            -L /tmp/restore_list.txt \
            /tmp/master_dump.dump 2>/tmp/restore_neon.log || RC=$?
          END=$(date +%s)
          cat /tmp/restore_neon.log
          echo "::endgroup::"

          FATAL=$(grep -cE "FATAL|could not connect|authentication failed|no password supplied" /tmp/restore_neon.log || true)
          if [ "$FATAL" -gt 0 ]; then
            echo "::error::neon-azure restore fatal error"
            exit 1
          fi
          if [ "$RC" -gt 1 ]; then
            echo "::error::pg_restore failed (exit $RC)"
            exit 1
          fi
          echo "neon-azure restore took $((END-START))s (exit: $RC)"
          echo "NEON_TIME=$((END-START))s" >> $GITHUB_ENV
          echo "NEON_RC=$RC" >> $GITHUB_ENV

      - name: Verify neon-azure
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.SLAVE_NEON_DSN }}
        run: |
          set -e
          # 重试机制：最多尝试 3 次
          for i in 1 2 3; do
            COUNT=$(psql -A -t "$DATABASE_URL" -c "SELECT count(*) FROM pg_stat_user_tables;" 2>/dev/null | tr -d '[:space:]') && break
            echo "::warning::Attempt $i failed, retrying in 5s..."
            sleep 5
          done

          # 空值检查
          if [ -z "$COUNT" ]; then
            echo "::warning::neon-azure: Unable to verify (connection failed)"
            echo "NEON_TABLES=?" >> $GITHUB_ENV
            exit 0
          fi

          echo "neon-azure: $COUNT tables"
          if [ "$COUNT" -ge 10 ]; then
            echo "NEON_TABLES=$COUNT" >> $GITHUB_ENV
          else
            echo "::warning::Table count ($COUNT) lower than expected (10)"
            echo "NEON_TABLES=$COUNT⚠️" >> $GITHUB_ENV
          fi

      # ========== 4. 清理 ==========
      - name: Cleanup
        if: always()
        run: rm -f /tmp/master_dump.dump /tmp/restore_*.log /tmp/restore_list.txt && rm -rf /tmp/backup-repo

      # ========== 5. 通知 ==========
      - name: Notify PushPlus
        if: always()
        run: |
          STATUS="${{ job.status }}"
          SYNC_TIME="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          ZEABUR_TABLES="${ZEABUR_TABLES:-?}"
          NEON_TABLES="${NEON_TABLES:-?}"
          DUMP_SIZE="${DUMP_SIZE:-?}"
          DUMP_TIME="${DUMP_TIME:-?}"
          ZEABUR_TIME="${ZEABUR_TIME:-?}"
          NEON_TIME="${NEON_TIME:-?}"

          if [ "$STATUS" = "success" ]; then
            TITLE="✅ DB 同步成功"
            CONTENT="<h3>主→从 数据库同步完成</h3><table><tr><td>时间</td><td>${SYNC_TIME}</td></tr><tr><td>备份大小</td><td>${DUMP_SIZE}</td></tr><tr><td>导出耗时</td><td>${DUMP_TIME}</td></tr><tr><td>zeabur-sjc1</td><td>${ZEABUR_TABLES} 表 (${ZEABUR_TIME})</td></tr><tr><td>neon-azure</td><td>${NEON_TABLES} 表 (${NEON_TIME})</td></tr></table><p><a href='${RUN_URL}'>查看详情</a></p>"
          else
            TITLE="❌ DB 同步失败"
            CONTENT="<h3>主→从 数据库同步失败</h3><p><a href='${RUN_URL}'>查看日志</a></p>"
          fi

          jq -n \
            --arg token "${{ secrets.PUSHPLUS_TOKEN }}" \
            --arg title "$TITLE" \
            --arg content "$CONTENT" \
            '{token: $token, title: $title, content: $content, template: "html"}' | \
          curl -s -X POST "https://www.pushplus.plus/send" \
            -H "Content-Type: application/json" \
            -d @-

      - name: Notify Feishu
        if: always()
        run: |
          STATUS="${{ job.status }}"
          SYNC_TIME="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          ZEABUR_TABLES="${ZEABUR_TABLES:-?}"
          NEON_TABLES="${NEON_TABLES:-?}"
          DUMP_SIZE="${DUMP_SIZE:-?}"

          if [ "$STATUS" = "success" ]; then
            COLOR="green"
            TEXT="**✅ DB 同步成功**\n\n- 时间：${SYNC_TIME}\n- 备份：${DUMP_SIZE}\n- zeabur-sjc1：${ZEABUR_TABLES} 表\n- neon-azure：${NEON_TABLES} 表"
          else
            COLOR="red"
            TEXT="**❌ DB 同步失败**\n\n[查看日志](${RUN_URL})"
          fi

          jq -n \
            --arg color "$COLOR" \
            --arg text "$TEXT" \
            '{msg_type: "interactive", card: {header: {title: {tag: "plain_text", content: "DB Sync 通知"}, template: $color}, elements: [{tag: "markdown", content: $text}]}}' | \
          curl -s -X POST "${{ secrets.FEISHU_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d @-
