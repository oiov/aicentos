name: DB Sync (Master → Slaves)

on:
  workflow_dispatch:

concurrency:
  group: db-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DUMP_FILE: /tmp/master_dump.dump
      MAX_PARALLEL: 5
      # ── 从库列表由单个 Secret 管理，每行格式: name|dsn ──
      # 新增从库只需编辑 GitHub Secret SLAVE_DSNS，无需改 workflow
      SLAVE_DSNS: ${{ secrets.SLAVE_DSNS }}
    steps:
      - name: Install PostgreSQL 18 client
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates git-lfs jq
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /usr/share/keyrings/pgdg.gpg
          echo "deb [signed-by=/usr/share/keyrings/pgdg.gpg] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-18
          # 确保 PG18 二进制优先于系统自带旧版
          echo "/usr/lib/postgresql/18/bin" >> $GITHUB_PATH

      # ========== 1. 完整导出主库 ==========
      - name: Dump master (full backup)
        env:
          DATABASE_URL: ${{ secrets.MASTER_DSN }}
        run: |
          set -e
          START=$(date +%s)
          pg_dump -v -d "$DATABASE_URL" \
            -F c \
            --compress=9 \
            -f "$DUMP_FILE"
          END=$(date +%s)
          DUMP_SIZE=$(du -h "$DUMP_FILE" | cut -f1)
          echo "Dump size: $DUMP_SIZE, took $((END-START))s"
          echo "DUMP_SIZE=$DUMP_SIZE" >> $GITHUB_ENV
          echo "DUMP_TIME=$((END-START))s" >> $GITHUB_ENV

          # 全量导出，恢复时不跳过任何表

      # ========== 2. 备份到 Git 仓库 ==========
      - name: Push dump to backup repo
        env:
          GH_TOKEN: ${{ secrets.BACKUP_REPO_TOKEN }}
        run: |
          set -e
          TIMESTAMP=$(date -u '+%Y-%m-%d_%H%M%S')
          FILENAME="${TIMESTAMP}.dump"

          FILE_SIZE_MB=$(du -m "$DUMP_FILE" | cut -f1)
          echo "Dump file size: ${FILE_SIZE_MB}MB"
          if [ "$FILE_SIZE_MB" -gt 500 ]; then
            echo "::warning::Dump file is ${FILE_SIZE_MB}MB, consider cleanup"
          fi

          gh repo clone fishxcode/new-api /tmp/backup-repo -- --depth 1 --single-branch --branch main
          cd /tmp/backup-repo

          # 配置 git 凭证，确保 push 时能认证
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/fishxcode/new-api.git"

          git lfs install
          grep -q 'pg/\*.dump' .gitattributes 2>/dev/null || git lfs track "pg/*.dump"
          git add .gitattributes

          mkdir -p pg
          cp "$DUMP_FILE" "pg/${FILENAME}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "pg/${FILENAME}"

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "backup: pg dump ${TIMESTAMP}"
            git push origin main || {
              git pull --rebase origin main
              git push origin main
            }
            echo "Pushed pg/${FILENAME} to fishxcode/new-api"
          fi
          rm -rf /tmp/backup-repo

      # ========== 3. 检查从库列表 ==========
      - name: Validate SLAVE_DSNS
        run: |
          if [ -z "$SLAVE_DSNS" ]; then
            echo "::error::SLAVE_DSNS secret is empty or not set"
            exit 1
          fi
          # 统计有效行数
          VALID=$(echo "$SLAVE_DSNS" | grep -cE '^[a-zA-Z0-9_-]+\|postgresql://' || true)
          echo "Found $VALID slave(s) in SLAVE_DSNS"
          if [ "$VALID" -eq 0 ]; then
            echo "::error::No valid 'name|postgresql://...' entries found in SLAVE_DSNS"
            exit 1
          fi

      # ========== 4. 恢复到所有从库 (并发执行，单库失败不阻断其他) ==========
      - name: Restore & verify all slaves
        shell: bash
        run: |
          # 不用 set -e，手动控制每个从库的错误处理
          REPORT=""
          FAILED=0
          TOTAL=0
          SUCCESS=0
          MAX_PARALLEL="${MAX_PARALLEL:-3}"

          # 合法化并发参数
          if ! [[ "$MAX_PARALLEL" =~ ^[0-9]+$ ]] || [ "$MAX_PARALLEL" -lt 1 ]; then
            echo "::warning::Invalid MAX_PARALLEL=$MAX_PARALLEL, fallback to 3"
            MAX_PARALLEL=3
          fi
          echo "Using MAX_PARALLEL=${MAX_PARALLEL}"

          declare -a SLAVE_NAMES
          declare -a SLAVE_DSNS_ARR

          # 先收集有效从库，避免并发阶段处理脏数据
          while IFS='|' read -r SLAVE_NAME SLAVE_DSN; do
            SLAVE_NAME=$(echo "$SLAVE_NAME" | xargs)  # trim whitespace
            [ -z "$SLAVE_NAME" ] && continue
            [[ "$SLAVE_NAME" == \#* ]] && continue
            [ -z "$SLAVE_DSN" ] && { echo "::warning::${SLAVE_NAME}: missing DSN, skipped"; continue; }

            SLAVE_NAMES+=("$SLAVE_NAME")
            SLAVE_DSNS_ARR+=("$SLAVE_DSN")
          done <<< "$SLAVE_DSNS"

          TOTAL=${#SLAVE_NAMES[@]}
          if [ "$TOTAL" -eq 0 ]; then
            echo "::error::No valid slave entries after parsing"
            exit 1
          fi

          run_one_slave() {
            local IDX="$1"
            local NAME="$2"
            local DSN="$3"
            local LOG_FILE="/tmp/restore_${IDX}.log"
            local RESULT_FILE="/tmp/restore_result_${IDX}.txt"
            local START END ELAPSED RC FATAL TABLE_COUNT

            echo ""
            echo "========== [$((IDX+1))/${TOTAL}] pg_restore → ${NAME} =========="
            echo "::group::pg_restore → ${NAME}"

            START=$(date +%s)
            RC=0
            pg_restore -v -d "${DSN}" \
              --clean --if-exists \
              --no-owner --no-privileges \
              "$DUMP_FILE" 2>"$LOG_FILE" || RC=$?

            END=$(date +%s)
            ELAPSED=$((END-START))
            cat "$LOG_FILE"
            echo "::endgroup::"

            # 检查致命连接错误
            FATAL=$(grep -cE "FATAL|could not connect|authentication failed|no password supplied|Connection refused" "$LOG_FILE" || true)
            if [ "$FATAL" -gt 0 ]; then
              echo "::error::${NAME} restore fatal connection error"
              echo "${NAME}|FATAL|?|${ELAPSED}s" > "$RESULT_FILE"
              return 0
            fi

            # pg_restore exit 1 = warnings (如 relation already exists)，可接受
            if [ "$RC" -gt 1 ]; then
              echo "::error::${NAME} pg_restore failed (exit $RC)"
              echo "${NAME}|FAIL(rc=${RC})|?|${ELAPSED}s" > "$RESULT_FILE"
              return 0
            fi

            echo "${NAME} restore took ${ELAPSED}s (exit: $RC)"

            # 验证表数量 (重试 3 次)
            TABLE_COUNT=""
            for i in 1 2 3; do
              TABLE_COUNT=$(psql -A -t "${DSN}" -c "SELECT count(*) FROM pg_stat_user_tables;" 2>/dev/null | tr -d '[:space:]') && break
              echo "::warning::${NAME} verify attempt $i failed, retrying in 5s..."
              TABLE_COUNT=""
              sleep 5
            done

            if [ -z "$TABLE_COUNT" ]; then
              echo "::warning::${NAME}: Unable to verify (connection failed after 3 retries)"
              TABLE_COUNT="?"
            else
              echo "${NAME}: ${TABLE_COUNT} tables"
              if [ "$TABLE_COUNT" -lt 10 ] 2>/dev/null; then
                echo "::warning::${NAME} table count ($TABLE_COUNT) lower than expected"
              fi
            fi

            echo "${NAME}|OK|${TABLE_COUNT}|${ELAPSED}s" > "$RESULT_FILE"
          }

          # 并发恢复，按 MAX_PARALLEL 控制并发度
          for idx in "${!SLAVE_NAMES[@]}"; do
            run_one_slave "$idx" "${SLAVE_NAMES[$idx]}" "${SLAVE_DSNS_ARR[$idx]}" &

            while [ "$(jobs -pr | wc -l | tr -d '[:space:]')" -ge "$MAX_PARALLEL" ]; do
              sleep 1
            done
          done

          wait

          # 汇总报告，保持原有 name|result|tables|time 格式
          for idx in "${!SLAVE_NAMES[@]}"; do
            RESULT_FILE="/tmp/restore_result_${idx}.txt"
            if [ ! -f "$RESULT_FILE" ]; then
              REPORT="${REPORT}${SLAVE_NAMES[$idx]}|FAIL(no-result)|?|?"$'\n'
              FAILED=$((FAILED+1))
              continue
            fi

            LINE=$(cat "$RESULT_FILE")
            REPORT="${REPORT}${LINE}"$'\n'

            RESULT_FIELD=$(echo "$LINE" | cut -d'|' -f2)
            if [[ "$RESULT_FIELD" == OK* ]]; then
              SUCCESS=$((SUCCESS+1))
            else
              FAILED=$((FAILED+1))
            fi
          done

          echo ""
          echo "===== Summary: ${SUCCESS}/${TOTAL} slaves OK, ${FAILED} failed ====="

          # 写入汇总到环境变量供通知步骤使用
          {
            echo "SYNC_REPORT<<REPORT_EOF"
            echo "$REPORT"
            echo "REPORT_EOF"
          } >> $GITHUB_ENV

          if [ "$FAILED" -gt 0 ]; then
            echo "::error::${FAILED}/${TOTAL} slave(s) failed"
            exit 1
          fi


      # ========== 4. 清理 ==========
      - name: Cleanup
        if: always()
        run: rm -f /tmp/master_dump.dump /tmp/restore_*.log && rm -rf /tmp/backup-repo

      # ========== 6. 通知 ==========
      - name: Notify PushPlus
        if: always()
        run: |
          STATUS="${{ job.status }}"
          SYNC_TIME="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          DUMP_SIZE="${DUMP_SIZE:-?}"
          DUMP_TIME="${DUMP_TIME:-?}"

          if [ "$STATUS" = "success" ]; then
            TITLE="✅ DB 同步成功"
            ROWS=""
            if [ -n "${SYNC_REPORT:-}" ]; then
              while IFS='|' read -r NAME RESULT TABLES TIME; do
                [ -z "$NAME" ] && continue
                ROWS="${ROWS}<tr><td>${NAME}</td><td>${RESULT}</td><td>${TABLES} 表</td><td>${TIME}</td></tr>"
              done <<< "$SYNC_REPORT"
            fi
            CONTENT="<h3>主→从 数据库同步完成</h3><table><tr><td>时间</td><td colspan=3>${SYNC_TIME}</td></tr><tr><td>备份大小</td><td colspan=3>${DUMP_SIZE}</td></tr><tr><td>导出耗时</td><td colspan=3>${DUMP_TIME}</td></tr><tr><th>从库</th><th>状态</th><th>表数</th><th>耗时</th></tr>${ROWS}</table><p><a href='${RUN_URL}'>查看详情</a></p>"
          else
            TITLE="❌ DB 同步失败"
            ROWS=""
            if [ -n "${SYNC_REPORT:-}" ]; then
              while IFS='|' read -r NAME RESULT TABLES TIME; do
                [ -z "$NAME" ] && continue
                ROWS="${ROWS}<tr><td>${NAME}</td><td>${RESULT}</td><td>${TABLES} 表</td><td>${TIME}</td></tr>"
              done <<< "$SYNC_REPORT"
            fi
            CONTENT="<h3>主→从 数据库同步失败</h3><table><tr><th>从库</th><th>状态</th><th>表数</th><th>耗时</th></tr>${ROWS}</table><p><a href='${RUN_URL}'>查看日志</a></p>"
          fi

          jq -n \
            --arg token "${{ secrets.PUSHPLUS_TOKEN }}" \
            --arg title "$TITLE" \
            --arg content "$CONTENT" \
            '{token: $token, title: $title, content: $content, template: "html"}' | \
          curl -s -X POST "https://www.pushplus.plus/send" \
            -H "Content-Type: application/json" \
            -d @-

      - name: Notify Feishu
        if: always()
        run: |
          STATUS="${{ job.status }}"
          SYNC_TIME="$(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          DUMP_SIZE="${DUMP_SIZE:-?}"

          SLAVE_LINES=""
          if [ -n "${SYNC_REPORT:-}" ]; then
            while IFS='|' read -r NAME RESULT TABLES TIME; do
              [ -z "$NAME" ] && continue
              SLAVE_LINES="${SLAVE_LINES}- ${NAME}：${RESULT} / ${TABLES} 表 (${TIME})\n"
            done <<< "$SYNC_REPORT"
          fi

          if [ "$STATUS" = "success" ]; then
            COLOR="green"
            TEXT="**✅ DB 同步成功**\n\n- 时间：${SYNC_TIME}\n- 备份：${DUMP_SIZE}\n${SLAVE_LINES}"
          else
            COLOR="red"
            TEXT="**❌ DB 同步失败**\n\n- 时间：${SYNC_TIME}\n${SLAVE_LINES}\n[查看日志](${RUN_URL})"
          fi

          jq -n \
            --arg color "$COLOR" \
            --arg text "$TEXT" \
            '{msg_type: "interactive", card: {header: {title: {tag: "plain_text", content: "DB Sync 通知"}, template: $color}, elements: [{tag: "markdown", content: $text}]}}' | \
          curl -s -X POST "${{ secrets.FEISHU_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d @-
