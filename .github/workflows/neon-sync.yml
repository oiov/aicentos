name: Sync main → back

on:
  schedule:
    # 每天 UTC 18:00（台北时间凌晨 2:00）
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 同步 main → back
        env:
          MAIN_DB_URL: ${{ secrets.MAIN_DB_URL }}
          BACK_DB_URL: ${{ secrets.BACK_DB_URL }}
        run: |
          set -euo pipefail

          echo "导出 main..."
          docker run --rm \
            -v /tmp:/backup \
            -e "DB_URL=${MAIN_DB_URL}" \
            postgres:17-bookworm \
            sh -c 'pg_dump -Fc -v -d "$DB_URL" -f /backup/sync.dump'

          echo "同步到 back..."
          docker run --rm \
            -v /tmp:/backup \
            -e "DB_URL=${BACK_DB_URL}" \
            postgres:17-bookworm \
            sh -c 'pg_restore -v --clean --if-exists --no-owner --no-privileges -d "$DB_URL" /backup/sync.dump'

          # rm -f /tmp/sync.dump
          # echo "同步完成 ✓"